# Pre-commit rápido (Lefthook, Go-based). Instalar uma vez por clone: `lefthook install`.
# Para overrides locais do dev, use `lefthook-local.yml` (git-ignored).
pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all --check
    clippy:
      # [escopo, M1] basedbrowser e servo-poc puxam o motor Servo, mas ele é uma dep CACHEADA:
      # com o cache quente o clippy roda em ~1s (não recompila o motor). Mantemos --exclude
      # servo-poc (PoC descartável, verificada manual/CI); basedbrowser (produto) CONTINUA coberto.
      # Ver docs/adr/0002+0003 + HARNESS-ROADMAP H1.
      run: cargo clippy --workspace --exclude servo-poc --all-targets -- -D warnings
    archgate:
      # [M8] Archgate (HARNESS-ROADMAP H3): acopla ADRs/config protegida a checks executáveis
      # (pin do Servo / toolchain = ADR-0002; status dos ADRs). Erro-como-instrução; rápido (segundos),
      # sem build. O MESMO check roda no CI (.github/workflows/ci.yml). Ver ADR-0011.
      run: scripts/checks/archgate.sh
