# Pre-commit rápido (Lefthook, Go-based). Instalar uma vez por clone: `lefthook install`.
# Para overrides locais do dev, use `lefthook-local.yml` (git-ignored).
pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all --check
    clippy:
      # [tailoring] servo-poc puxa o motor Servo (build de vários GB). Excluímos ele do
      # clippy de pre-commit para NÃO recompilar o motor a cada commit; servo-poc é
      # verificado deliberadamente (build manual/CI). Ver docs/adr/0002 + HARNESS-ROADMAP H1.
      run: cargo clippy --workspace --exclude servo-poc --all-targets -- -D warnings
